<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gabi & Diego</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="choice-page">
    <main class="choice-shell">
      <section class="choice-hero">
        <div class="hero-copy">
          <p class="eyebrow">Gabi & Diego</p>
          <h1>Escolha uma das duas opcoes de envio de fotos!</h1>
        </div>
        <div class="memory-strip" aria-hidden="true">
          <img src="/assets/gabidiego-fountain-light.jpg" alt="" />
          <img src="/assets/gabidiego-neon.jpg" alt="" />
          <img src="/assets/gabidiego-brick.jpg" alt="" />
        </div>
        <div class="choice-grid" aria-label="Escolha o tipo de foto">
          <a class="choice-card wedding-choice" href="/casamento">
            <span>Fotos do casamento</span>
          </a>
          <a class="choice-card quest-choice" href="/quest">
            <span>Fotos de Missao</span>
          </a>
        </div>
        <div class="status-line choice-status" id="statusLine">Verificando envio...</div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
