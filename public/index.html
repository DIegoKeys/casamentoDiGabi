<!doctype html>
<html lang="pt-BR">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gabi & Diego</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="choice-page">

      <section class="choice-hero">

          <a class="choice-card quest-choice" href="/quest">
            <span>Fotos de Quest</span>
          </a>
        </div>
        <div class="status-line choice-status" id="statusLine">Verificando envio...</div>
      </section>
    </main>

    <script src="/app.js"></script>
